<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question très importante 👀</title>

<style>
    body {
        text-align: center;
        font-family: Arial, sans-serif;
        margin-top: 100px;
        overflow: hidden;
        background: #ffe6eb;
    }

    h1 {
        color: #333;
        padding: 20px;
    }

    .container {
        position: relative;
        margin-top: 50px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px;
    }

    #yes {
        background-color: #4CAF50;
        color: white;
    }

    #no {
        background-color: #f44336;
        color: white;
        position: absolute;
    }

    .float {
        position: absolute;
        font-size: 25px;
        animation: floatUp linear infinite;
        opacity: 0.8;
    }

    @keyframes floatUp {
        from { transform: translateY(100vh); }
        to { transform: translateY(-10vh); }
    }
</style>
</head>

<body>

<h1 id="question">Est-ce que tu veux devenir ma princesse ? 👑❤️</h1>
<p id="sub">(Attention, décision importante 😏)</p>

<div class="container">
    <button id="yes">Oui 💖</button>
    <button id="no">Non 😢</button>
</div>

<script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const question = document.getElementById("question");
    const sub = document.getElementById("sub");

    let step = 0;

    const questions = [
        "Mais attends… tu acceptes d’être une princesse… mais pas trop sage ? 😏",
        "Une princesse qui rigole pour rien ? 😂",
        "Une princesse un peu reloue parfois ? 👀",
        "Une princesse qui doit supporter mes bêtises ? 😜",
        "Une princesse qui va recevoir beaucoup (beaucoup) d’amour ? ❤️",
        "Une princesse qui promet de ne jamais abandonner son roi (moi 😌) ? 👑",
        "Alors… tu confirmes que tu deviens officiellement MA princesse ? 💍"
    ];

    yesBtn.onclick = () => {
        step++;

        if(step < questions.length){
            question.innerText = questions[step];
            sub.innerText = "(Chaque oui te rapproche de ton destin 😏)";
        } else {
            document.body.innerHTML = `
                <h1>Bienvenue princesse 👑❤️</h1>
                <p>Maintenant t’es coincée avec ton roi 😏</p>
            `;
        }
    };

    noBtn.addEventListener("mouseover", function() {
        const x = Math.random() * window.innerWidth * 0.8;
        const y = Math.random() * window.innerHeight * 0.6;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    const emojis = ["❤️", "🌸", "🧸", "👑"];

    function createFloat() {
        const el = document.createElement("div");
        el.classList.add("float");
        el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

        el.style.left = Math.random() * 100 + "vw";
        el.style.animationDuration = (3 + Math.random() * 5) + "s";

        document.body.appendChild(el);

        setTimeout(() => el.remove(), 8000);
    }

    setInterval(createFloat, 400);
</script>

</body>
</html>
